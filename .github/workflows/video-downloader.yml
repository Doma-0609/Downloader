
name: Video Downloader & Splitter

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'لینک مستقیم ویدیو'
        required: true
        type: string
      job_id:
        description: 'شناسه یکتای کار'
        required: true
        type: string
      callback_url:
        description: 'آدرس callback'
        required: false
        type: string

permissions:
  contents: write

jobs:
  download-and-split:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
      
      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg
      
      - name: Download and split video
        id: split
        run: |
          VIDEO_URL="${{ github.event.inputs.video_url }}"
          JOB_ID="${{ github.event.inputs.job_id }}"
          
          OUTPUT_DIR="downloads/${JOB_ID}"
          mkdir -p "${OUTPUT_DIR}"
          
          echo "📥 در حال دانلود..."
          DL_NAME="original_video.mp4"
          if curl -L --fail --retry 5 --retry-delay 10 --connect-timeout 30 \
               --max-time 7200 \
               -o "${DL_NAME}" "$VIDEO_URL"; then
            
            FILE_SIZE=$(ls -lh "${DL_NAME}" | awk '{print $5}')
            echo "✅ دانلود شد: ${FILE_SIZE}"
            
            echo "✂️ در حال قطعه‌قطعه کردن..."
            ffmpeg -i "${DL_NAME}" \
                   -c copy \
                   -map 0 \
                   -segment_time 300 \
                   -f segment \
                   -reset_timestamps 1 \
                   "${OUTPUT_DIR}/segment_%03d.mp4"
            
            SEGMENT_COUNT=$(ls -1 "${OUTPUT_DIR}"/*.mp4 | wc -l)
            echo "📦 تعداد قطعات: ${SEGMENT_COUNT}"
            
            rm "${DL_NAME}"
            
            echo "segment_count=${SEGMENT_COUNT}" >> $GITHUB_OUTPUT
            echo "output_dir=${OUTPUT_DIR}" >> $GITHUB_OUTPUT
          else
            echo "❌ دانلود ناموفق"
            exit 1
          fi
      
      - name: Commit and push
        run: |
          OUTPUT_DIR="${{ steps.split.outputs.output_dir }}"
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "actions@github.com"
          
          git add "${OUTPUT_DIR}/"*.mp4 2>/dev/null || true
          
          if ! git diff --staged --quiet; then
            git commit -m "Add video ${{ github.event.inputs.job_id }} (${{ steps.split.outputs.segment_count }} segments)"
            
            for attempt in $(seq 1 10); do
              echo "⏳ Push attempt ${attempt}/10..."
              git pull --rebase 2>/dev/null || true
              if git push; then
                echo "✅ Push موفق"
                break
              fi
              sleep 15
            done
          fi
      
      - name: Notify server
        if: success() && github.event.inputs.callback_url != ''
        run: |
          CALLBACK_URL="${{ github.event.inputs.callback_url }}"
          
          curl -X POST "${CALLBACK_URL}" \
               -H "Content-Type: application/json" \
               -d "{
                 \"job_id\": \"${{ github.event.inputs.job_id }}\",
                 \"status\": \"completed\",
                 \"segments\": ${{ steps.split.outputs.segment_count }},
                 \"repo\": \"${{ github.repository }}\",
                 \"path\": \"${{ steps.split.outputs.output_dir }}\"
               }"
      
      - name: Notify failure
        if: failure() && github.event.inputs.callback_url != ''
        run: |
          CALLBACK_URL="${{ github.event.inputs.callback_url }}"
          
          curl -X POST "${CALLBACK_URL}" \
               -H "Content-Type: application/json" \
               -d "{
                 \"job_id\": \"${{ github.event.inputs.job_id }}\",
                 \"status\": \"failed\"
               }"
